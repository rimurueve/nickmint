services:
  - type: web
    name: nickmint-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        value: 8501506046:AAFQkRD6vmMtu__aPfzazGm3pxV_GyEcsWI
      - key: ADMIN_ID
        value: "8330904314"
      - key: WEBAPP_URL
        sync: false   # Fill in after first deploy
      - key: DATABASE_URL
        value: nickmint.db
    disk:
      name: nickmint-data
      mountPath: /data
      sizeGB: 1
